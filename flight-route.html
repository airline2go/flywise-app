<script>
var PROXY = 'https://api.airpiv.com';

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

var params = new URLSearchParams(window.location.search);
// [CLEAN-URLS] Reads the slug from the new /flights/{slug} path first —
// falls back to the legacy ?slug= query param so any already-shared or
// indexed old-format link keeps working exactly as before. Nothing here
// breaks the old URLs; it only prefers the new ones going forward.
var cleanMatch = window.location.pathname.match(/^\/flights\/([^\/]+)\/?$/);
var slug = cleanMatch ? decodeURIComponent(cleanMatch[1]) : params.get('slug');

function flightUrl(s) { return '/flights/' + encodeURIComponent(s); }
function cityUrl(s) { return '/city/' + encodeURIComponent(s); }
function countryUrl(c) { return '/country/' + encodeURIComponent(c); }
function airportUrl(c) { return '/airport/' + encodeURIComponent(c); }

if (!slug) {
  renderNotFound();
} else {
  fetch(PROXY + '/route-pages/' + encodeURIComponent(slug))
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok || !j.route) { renderNotFound(); return; }
      renderRoute(j.route);
    })
    .catch(function(){ renderNotFound(); });
}

function renderNotFound() {
  document.getElementById('route-content').innerHTML =
    '<h1>Route nicht gefunden</h1>' +
    '<p style="color:var(--tx3)">Diese Flugroute ist nicht verfügbar.</p>' +
    '<a href="/" class="btn-t" style="display:inline-flex;margin-top:12px">← Flüge suchen</a>';
}

function renderRoute(route) {
  // [ROUTE-SEO-OVERRIDES] Falls back to the exact same auto-generated
  // text as before when the admin hasn't set a custom override — zero
  // behavior change for any route that doesn't use this field.
  var title = route.custom_title || ('Flüge von ' + route.origin_city + ' nach ' + route.destination_city);
  var description = route.custom_meta_description || ('Günstige Flüge von ' + route.origin_city + ' (' + route.origin_iata + ') nach ' + route.destination_city + ' (' + route.destination_iata + ') finden und buchen — Preise vergleichen mit Airpiv.');
  var url = 'https://airpiv.com' + flightUrl(route.slug);

  // [CLEAN-URLS] If this page was reached via the legacy ?slug= link,
  // silently swap the address bar to the new clean URL (no reload, no
  // navigation) so the canonical tag and the visible URL always agree,
  // and anyone bookmarking/sharing from here gets the new format.
  if (!cleanMatch) {
    window.history.replaceState(null, '', flightUrl(route.slug));
  }

  document.getElementById('page-title').textContent = title + ' | Airpiv';
  document.getElementById('page-description').setAttribute('content', description);
  document.getElementById('page-canonical').setAttribute('href', url);
  document.getElementById('og-title').setAttribute('content', title);
  document.getElementById('og-description').setAttribute('content', description);
  document.getElementById('og-url').setAttribute('content', url);

  // [ROUTE-CONTENT-EXPANSION-800] Intro expanded to the requested
  // 200-300 word range. Genuinely varies per route (not just a
  // name-swap template) by conditionally including sentences built from
  // real per-route facts already computed server-side — distance_km and
  // haul_type — rather than inventing anything new.
  var distanceSentence = route.distance_km != null ? (', rund ' + route.distance_km.toLocaleString('de-DE') + ' km entfernt') : '';
  var haulSentence = route.haul_type === 'long-haul'
    ? ' Damit handelt es sich um eine Langstreckenverbindung, für die sich eine frühzeitige Planung besonders lohnt.'
    : (route.haul_type === 'short-haul' ? ' Damit handelt es sich um eine Kurz- bis Mittelstreckenverbindung, die sich auch spontan gut buchen lässt.' : '');
  var introText = route.intro_text || (
    'Du planst eine Reise von ' + route.origin_city + ' nach ' + route.destination_city + '? Diese Verbindung gehört zu den gefragten Flugstrecken und wird sowohl von Geschäftsreisenden als auch von Urlaubern regelmäßig genutzt, da sie ' + route.origin_city + ' und ' + route.destination_city + ' direkt miteinander verbindet' + distanceSentence + '.' + haulSentence +
    ' Mit Airpiv vergleichst du in Sekunden hunderte Airlines und findest in Echtzeit den besten Preis für deinen Flug auf dieser Strecke — transparent, ohne versteckte Kosten und mit Bestpreisgarantie.' +
    ' Egal, ob du kurzfristig buchen musst oder deine Reise frühzeitig planst: Unsere Suche zeigt dir alle verfügbaren Verbindungen zwischen ' + route.origin_city + ' (' + route.origin_iata + ') und ' + route.destination_city + ' (' + route.destination_iata + ') auf einen Blick — inklusive Direktflügen und Flügen mit Zwischenstopp, damit du die für dich passende Option findest.' +
    ' Mit der flexiblen Datumssuche kannst du außerdem verschiedene Reisetermine direkt vergleichen, und mit dem Preisalarm wirst du automatisch benachrichtigt, sobald der Preis für diese Strecke fällt — so verpasst du kein günstiges Angebot.' +
    ' Buchungen laufen bei Airpiv komplett online ab: Flug auswählen, Daten eingeben, sicher bezahlen — und du erhältst deine Bestätigung sofort per E-Mail.' +
    ' Auf dieser Seite findest du außerdem alle wichtigen Informationen für deine Reise: die beste Reisezeit, die wichtigsten Sehenswürdigkeiten in ' + route.destination_city + ', praktische Reisetipps sowie die Airlines, die diese Strecke bedienen — damit du deine gesamte Reise von Anfang an gut planen kannst.'
  );

  var bookingUrl = '/?from=' + encodeURIComponent(route.origin_iata) + '&to=' + encodeURIComponent(route.destination_iata);

  // [BREADCRUMB] Home → Country → City → Route — the full chain via the
  // destination side (the more relevant classification for "which
  // country/city is this flight going to"). Each segment degrades
  // independently: a route missing destination_country or
  // destination_city_slug (e.g. created before these columns existed)
  // simply skips that segment rather than showing a broken link.
  var breadcrumbHtml = '<nav class="breadcrumb" aria-label="Breadcrumb"><a href="/">Startseite</a><span>›</span>';
  if (route.destination_country) {
    breadcrumbHtml += '<a href="' + countryUrl(route.destination_country) + '">' + escHtml(route.destination_country) + '</a><span>›</span>';
  }
  if (route.destination_city_slug) {
    breadcrumbHtml += '<a href="' + cityUrl(route.destination_city_slug) + '">' + escHtml(route.destination_city) + '</a><span>›</span>';
  }
  breadcrumbHtml += '<span>' + escHtml(route.origin_city) + ' → ' + escHtml(route.destination_city) + '</span></nav>';

  // [AIRPORT-INFO] Links to both airport pages.
  var airportInfoHtml = '<section class="airport-info-section"><h2>Flughafeninformationen</h2><div class="airport-info-grid">' +
    '<a class="airport-info-card" href="' + airportUrl(route.origin_iata) + '"><span class="airport-info-code">' + escHtml(route.origin_iata) + '</span><span class="airport-info-city">' + escHtml(route.origin_city) + '</span></a>' +
    '<a class="airport-info-card" href="' + airportUrl(route.destination_iata) + '"><span class="airport-info-code">' + escHtml(route.destination_iata) + '</span><span class="airport-info-city">' + escHtml(route.destination_city) + '</span></a>' +
  '</div></section>';

  // [ROUTE-CONTENT-EXPANSION] Internal links section (#7) — city pages
  // for both endpoints, complementing the airport-info and
  // related-routes sections already present. Degrades gracefully: a
  // route missing a city slug simply omits that one link.
  var cityLinkCards = [];
  if (route.destination_city_slug) {
    cityLinkCards.push('<a class="related-route-card" href="' + cityUrl(route.destination_city_slug) + '">Mehr über ' + escHtml(route.destination_city) + '</a>');
  }
  if (route.origin_city_slug) {
    cityLinkCards.push('<a class="related-route-card" href="' + cityUrl(route.origin_city_slug) + '">Mehr über ' + escHtml(route.origin_city) + '</a>');
  }
  var cityLinksHtml = cityLinkCards.length
    ? '<section class="route-content-section"><h2>Weiterführende Links</h2><div class="related-routes-grid">' + cityLinkCards.join('') + '</div></section>'
    : '';

  // [ROUTE-CONTENT-EXPANSION-800] Section — destination/airport info.
  // Purely sync (no async dependency), built entirely from real
  // per-route fields (airport code, distance, optional admin
  // weekly_flights) — no fabricated city description.
  var distanceClauseDestInfo = route.distance_km != null ? (' Die Entfernung beträgt rund ' + route.distance_km.toLocaleString('de-DE') + ' km.') : '';
  var weeklyFlightsSentence = (route.weekly_flights != null) ? (' Es werden durchschnittlich rund ' + route.weekly_flights + ' Flüge pro Woche auf dieser Strecke angeboten.') : '';
  var destInfoText = route.destination_city + ' wird über den Flughafen ' + route.destination_iata + ' angeflogen. ' + route.origin_city + ' und ' + route.destination_city + ' sind auf dieser Strecke direkt miteinander verbunden.' + distanceClauseDestInfo + weeklyFlightsSentence + ' Der Flughafen ' + route.destination_iata + ' ist in der Regel gut an die Innenstadt von ' + route.destination_city + ' angebunden, sodass du nach der Landung schnell dein Ziel erreichst, egal ob mit Bahn, Bus oder Taxi. Alle weiteren Details zum Flughafen — darunter zusätzliche Strecken und Verbindungen ab und nach ' + route.destination_iata + ' — findest du auf unserer Flughafenseite.';
  var destInfoHtml = '<section class="route-content-section"><h2>Ziel- und Flughafeninformationen</h2><p>' + escHtml(destInfoText) + '</p></section>';

  // [ROUTE-PAGES-DISTANCE] Real, server-computed distance — shown only
  // when available (older routes created before this feature, or any
  // route missing coordinates for some reason, simply don't show this
  // line rather than displaying a fabricated/guessed number).
  var distanceHtml = '';
  if (route.distance_km != null) {
    var haulLabel = route.haul_type === 'long-haul' ? 'Langstreckenflug' : 'Kurzstreckenflug';
    distanceHtml = '<div style="color:rgba(255,255,255,.5);font-size:12px;margin-top:6px">📏 ' + route.distance_km.toLocaleString('de-DE') + ' km · ' + haulLabel + '</div>';
  }

  // [ROUTE-CONTENT-EXPANSION] Section #3 — best time to travel. Optional
  // admin override; otherwise a general, honest fallback (no fabricated
  // per-destination seasonal claims, since no real seasonal data source
  // exists anywhere in this codebase).
  var bestTimeText = route.best_time_text || ('Der beste Zeitpunkt für eine Reise von ' + route.origin_city + ' nach ' + route.destination_city + ' hängt von deinen persönlichen Vorlieben ab. Wer Menschenmengen meiden und gleichzeitig von günstigeren Preisen profitieren möchte, reist häufig in der Nebensaison — meist im Frühjahr oder Herbst, außerhalb der Sommerferien und der großen Feiertage. In diesen Zeiträumen sind Flüge und Unterkünfte oft günstiger, während das Wetter in vielen Regionen weiterhin angenehm bleibt. Wer hingegen ein bestimmtes Klima oder eine bestimmte Jahreszeit bevorzugt, sollte sich vorab über die saisonalen Bedingungen am Zielort informieren. Mit der flexiblen Datumssuche von Airpiv kannst du verschiedene Reisetermine vergleichen und so den günstigsten sowie passendsten Zeitpunkt für deinen Flug finden.');
  var bestTimeHtml = '<section class="route-content-section"><h2>Beste Reisezeit</h2><p>' + escHtml(bestTimeText) + '</p></section>';

  // [ROUTE-CONTENT-EXPANSION-800] Section — Reisetipps (traveler tips).
  // Practical, generic advice — no fabricated destination-specific
  // claims. Two clauses vary on real per-route data: check-in timing on
  // haul_type, and document advice on whether origin/destination are in
  // different countries (both already computed/known server-side).
  var checkinSentence = route.haul_type === 'long-haul'
    ? 'Plane für diesen Langstreckenflug ausreichend Zeit ein — in der Regel solltest du etwa 3 Stunden vor Abflug am Flughafen sein.'
    : (route.haul_type === 'short-haul'
      ? 'Plane für diese Kurz- bis Mittelstreckenverbindung ausreichend Zeit ein — in der Regel reichen etwa 2 Stunden vor Abflug am Flughafen.'
      : 'Plane genügend Zeit für den Check-in ein — je nach Fluglänge meist zwischen 2 und 3 Stunden vor Abflug.');
  var crossBorder = route.origin_country && route.destination_country && route.origin_country !== route.destination_country;
  var docsSentence = crossBorder
    ? 'Da diese Strecke ins Ausland führt, solltest du rechtzeitig prüfen, ob dein Reisepass oder Personalausweis noch lange genug gültig ist.'
    : 'Für diese Verbindung genügt in der Regel ein gültiger Personalausweis — informiere dich aber vorab über die genauen Einreisebestimmungen für dein Reiseziel.';
  var bookingWindowLine = route.haul_type === 'long-haul'
    ? 'Bei Langstreckenflügen wie dieser Verbindung empfiehlt es sich in der Regel, etwa 2 bis 4 Monate im Voraus zu buchen.'
    : (route.haul_type === 'short-haul'
      ? 'Bei Kurz- und Mittelstreckenflügen wie dieser Verbindung empfiehlt es sich in der Regel, etwa 4 bis 8 Wochen im Voraus zu buchen.'
      : 'Ein früher Buchungszeitpunkt zahlt sich auf den meisten Strecken aus — je nach Entfernung liegt das ideale Zeitfenster meist zwischen 6 Wochen und 4 Monaten vor Abflug.');
  var travelTipsText = checkinSentence + ' ' + docsSentence + ' Achte außerdem auf die Handgepäckbestimmungen deiner Airline, da sich Größe und Gewicht je nach Anbieter unterscheiden können. ' + bookingWindowLine + ' Eine Reiseversicherung kann sinnvoll sein, um dich gegen unvorhergesehene Ereignisse wie Flugausfälle oder Gepäckverlust abzusichern. Es lohnt sich außerdem, dich vorab kurz über die gängige Landeswährung und gebräuchliche Zahlungsmethoden am Zielort zu informieren, damit du bei der Ankunft direkt gut vorbereitet bist. Speichere deine Bordkarte und wichtigen Dokumente idealerweise auch offline auf deinem Smartphone, falls die Internetverbindung am Flughafen einmal schwach sein sollte.';
  var travelTipsHtml = '<section class="route-content-section"><h2>Reisetipps</h2><p>' + escHtml(travelTipsText) + '</p></section>';

  // [ROUTE-CONTENT-EXPANSION] Section #5 — what to visit. Optional admin
  // override; otherwise a general fallback that never invents specific
  // landmark names for destinations with no curated content, and links
  // through to the city page for anyone who wants more detail.
  var attractionsText = route.attractions_text || (route.destination_city + ' hat für Besucher einiges zu bieten — von historischen Sehenswürdigkeiten über lebendige Stadtviertel bis hin zu vielfältigen kulinarischen Angeboten. Egal, ob du Museen, Architektur, Parks oder das lokale Nachtleben erkunden möchtest: Die Stadt lässt sich sowohl bei einem Kurztrip als auch bei einem längeren Aufenthalt gut erleben. Viele der wichtigsten Ziele liegen nah beieinander und lassen sich bequem zu Fuß, mit dem Fahrrad oder den öffentlichen Verkehrsmitteln erreichen — ideal, um auch bei einem kurzen Zwischenstopp möglichst viel zu sehen. Die Anbindung an den öffentlichen Nahverkehr macht es meist einfach, vom Flughafen aus direkt die wichtigsten Ziele in der Innenstadt zu erreichen.');
  var attractionsMoreLink = route.destination_city_slug ? (' <a href="' + cityUrl(route.destination_city_slug) + '">Mehr über ' + escHtml(route.destination_city) + '</a>') : '';
  var attractionsHtml = '<section class="route-content-section"><h2>Top-Sehenswürdigkeiten in ' + escHtml(route.destination_city) + '</h2><p>' + escHtml(attractionsText) + attractionsMoreLink + '</p></section>';

  // [ROUTE-CONTENT-EXPANSION-800] Section — Airlines auf dieser Strecke.
  // The weekly_flights figure moved to the destination-info section
  // above (it's a connectivity fact about the city, not the airlines);
  // this section stays focused on carriers, upgraded in place with real
  // Duffel airline names once the price-check request returns below.
  var flightInfoIntro = 'Mehrere Airlines bedienen die Strecke von ' + route.origin_city + ' nach ' + route.destination_city + '. Ein Vergleich lohnt sich, da sich Faktoren wie Freigepäck, Sitzabstand und Umbuchungsbedingungen je nach Airline unterscheiden können. Vergleiche Preise und Leistungen direkt in unserer Suche, um die für dich passende Airline zu finden.';
  var flightInfoHtml = '<section class="route-insights-section" id="route-insights-section"><h2>Airlines auf dieser Strecke</h2><p>' + escHtml(flightInfoIntro) + '</p><p style="color:var(--tx3);font-size:13px">Flugzeit und Airlines werden geladen …</p></section>';

  // [ROUTE-CONTENT-EXPANSION] Section #6 — FAQ, exactly the 4 requested
  // questions. Admin's custom_faq (if set) still fully overrides this,
  // same as before. Otherwise these 4 render synchronously with honest
  // "check the search" fallbacks, then 3 of them (duration, direct
  // flights, best airline) get upgraded in place with real Duffel data
  // once it arrives — never a placeholder pretending to be real data,
  // and never duplicated/appended like the old flow did.
  var usingCustomFaq = !!(route.custom_faq && route.custom_faq.length);
  var faqItems = usingCustomFaq ? route.custom_faq : [
    { question: 'Wie lange dauert der Flug von ' + route.origin_city + ' nach ' + route.destination_city + '?',
      answer: 'Die genaue Flugzeit hängt vom gewählten Flug ab. Nutze unsere Suche, um die aktuelle Flugdauer für deinen Wunschtermin zu sehen.' },
    { question: 'Was ist der günstigste Monat für einen Flug von ' + route.origin_city + ' nach ' + route.destination_city + '?',
      answer: 'Generell sind Flüge außerhalb der Sommerferien (Juni bis August) und der Weihnachtsferien meist günstiger, da die Nachfrage in dieser Zeit geringer ist. Mit der flexiblen Datumssuche von Airpiv kannst du die Preise für verschiedene Monate direkt vergleichen.' },
    { question: 'Gibt es Direktflüge von ' + route.origin_city + ' nach ' + route.destination_city + '?',
      answer: 'Das siehst du direkt in unserer Flugsuche — dort werden sowohl Direktflüge als auch Verbindungen mit Zwischenstopp angezeigt.' },
    { question: 'Welche Airline ist am besten für die Strecke ' + route.origin_city + '–' + route.destination_city + '?',
      answer: 'Mehrere Airlines bedienen diese Strecke. Vergleiche Preise, Gepäckbedingungen und Bewertungen direkt in der Suche, um die für dich passende Airline zu finden.' },
  ];
  var faqHtml = faqItems.map(function(f, i) {
    return '<div class="route-faq-item" id="faq-item-' + i + '"><div class="route-faq-q">' + escHtml(f.question) + '</div><div class="route-faq-a">' + escHtml(f.answer) + '</div></div>';
  }).join('');

  document.getElementById('route-content').innerHTML =
    breadcrumbHtml +
    '<h1>' + escHtml(title) + '</h1>' +
    '<div class="route-hero">' +
      '<div class="route-hero-cities">' +
        '<span>' + escHtml(route.origin_city) + '</span>' +
        '<span class="route-hero-arrow">✈</span>' +
        '<span>' + escHtml(route.destination_city) + '</span>' +
      '</div>' +
      distanceHtml +
      '<div class="route-price-box" id="route-price-box">' +
        '<div style="color:rgba(255,255,255,.5);font-size:13px">Preis wird geladen…</div>' +
      '</div>' +
      '<a href="' + bookingUrl + '" class="route-cta">Jetzt Flüge suchen →</a>' +
    '</div>' +
    '<section><p>' + escHtml(introText) + '</p></section>' +
    destInfoHtml +
    flightInfoHtml +
    bestTimeHtml +
    attractionsHtml +
    travelTipsHtml +
    airportInfoHtml +
    cityLinksHtml +
    '<section class="route-faq">' +
      '<h2>Häufige Fragen</h2>' +
      faqHtml +
    '</section>' +
    '<section id="related-routes-section"></section>';

  function buildFaqSchema(items) {
    return {
      "@type": "FAQPage",
      "mainEntity": items.map(function(f) {
        return { "@type": "Question", "name": f.question, "acceptedAnswer": { "@type": "Answer", "text": f.answer } };
      })
    };
  }

  function refreshSchema() {
    document.getElementById('route-schema').textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": title,
      "description": description,
      "url": url,
      "mainEntity": buildFaqSchema(faqItems)
    });
  }
  refreshSchema();

  // [RELATED-ROUTES] Fetched separately — never blocks the rest of the
  // page from rendering, and the section simply doesn't appear if there
  // are no related routes to show (e.g. the very first route published).
  fetch(PROXY + '/route-pages/' + encodeURIComponent(route.slug) + '/related')
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok || !j.related || !j.related.length) return;
      var section = document.getElementById('related-routes-section');
      section.innerHTML = '<h2>Ähnliche Flugrouten</h2><div class="related-routes-grid">' +
        j.related.map(function(r) {
          return '<a class="related-route-card" href="' + flightUrl(r.slug) + '">' +
            escHtml(r.origin_city) + ' → ' + escHtml(r.destination_city) +
          '</a>';
        }).join('') +
      '</div>';
    })
    .catch(function(){ /* related routes are a bonus, not critical — fail silently */ });

  // Fetch the live indicative price separately — never blocks the rest of
  // the page from rendering if Duffel is briefly slow/unavailable.
  fetch(PROXY + '/route-price?from=' + encodeURIComponent(route.origin_iata) + '&to=' + encodeURIComponent(route.destination_iata))
    .then(function(r){ return r.json(); })
    .then(function(j){
      var box = document.getElementById('route-price-box');
      if (j.ok && j.price != null) {
        box.innerHTML = '<div class="route-price-val">ab ' + j.price.toFixed(0) + ' €</div><div class="route-price-lbl">Indikativer Preis · Economy · 1 Erwachsener</div>';
        // [DATE-MATCH-FIX] Carry the exact date this price was computed
        // for into the search link — clicking "Jetzt Flüge suchen" now
        // lands the customer on a search for that SAME date, instead of
        // defaulting to today (which would likely show a different,
        // probably higher, last-minute fare right after they just saw
        // this indicative price — a bait-and-switch feeling worth
        // avoiding). Only added when a real date actually came back.
        if (j.departure_date) {
          var ctaLink = document.querySelector('.route-cta');
          if (ctaLink) ctaLink.href = ctaLink.getAttribute('href') + '&depart=' + encodeURIComponent(j.departure_date);
        }
      } else {
        box.innerHTML = '<div style="color:rgba(255,255,255,.5);font-size:13px">Aktuelle Preise direkt in der Suche verfügbar</div>';
      }
      // [ROUTE-INSIGHTS] Real flight facts from the same Duffel offers
      // just fetched for pricing — never invented. Only rendered when
      // insights actually came back; an older cached price entry or a
      // route with zero offers simply skips this section rather than
      // showing fabricated numbers.
      if (j.ok && j.insights) {
        var ins = j.insights;
        function fmtHrsMin(min) {
          var h = Math.floor(min / 60), m = min % 60;
          return h + ' Std' + (m > 0 ? ' ' + m + ' Min' : '');
        }
        var directLine = ins.allDirect
          ? 'Alle gefundenen Flüge sind Direktflüge.'
          : (ins.directAvailable ? 'Direktflüge sind auf dieser Strecke verfügbar.' : 'Auf dieser Strecke gibt es aktuell keine Direktflüge — nur Verbindungen mit Zwischenstopp.');
        var airlinesLine = ins.airlines.length
          ? ('Zu den Airlines, die diese Strecke bedienen, zählen unter anderem ' + ins.airlines.join(', ') + '.')
          : '';

        // Section — upgrade the Airlines placeholder with the real
        // carrier names plus duration/direct-flight facts. Everything is
        // assembled as plain text first, then escHtml'd once at the end —
        // avoids double-escaping the airline names pulled from Duffel.
        var airlinesBodyText = (airlinesLine ? airlinesLine + ' ' : '') + flightInfoIntro + ' Die durchschnittliche Flugzeit auf dieser Strecke beträgt ' + fmtHrsMin(ins.avgDurationMin) + '. ' + directLine;
        var insightsHtml = '<section class="route-insights-section" id="route-insights-section"><h2>Airlines auf dieser Strecke</h2><p>' +
          escHtml(airlinesBodyText) +
          '</p><div class="route-insights-grid">' +
          '<div class="route-insight-card"><div class="route-insight-val">' + fmtHrsMin(ins.avgDurationMin) + '</div><div class="route-insight-lbl">Durchschnittliche Flugzeit</div></div>' +
          '<div class="route-insight-card"><div class="route-insight-val">' + fmtHrsMin(ins.minDurationMin) + '</div><div class="route-insight-lbl">Kürzeste gefundene Flugzeit</div></div>' +
        '</div></section>';
        var insightsTarget = document.getElementById('route-insights-section');
        if (insightsTarget) insightsTarget.outerHTML = insightsHtml;

        // Section #6 — upgrade FAQ items 0 (duration), 2 (direct flights)
        // and 3 (best airline) in place with real data, and keep the
        // JSON-LD schema in sync. Skipped entirely when the admin set a
        // custom FAQ — that content is hand-written and never
        // auto-modified.
        if (!usingCustomFaq) {
          faqItems[0].answer = 'Die durchschnittliche Flugzeit auf dieser Strecke liegt bei ' + fmtHrsMin(ins.avgDurationMin) + '.';
          faqItems[2].answer = directLine;
          if (ins.airlines.length) {
            faqItems[3].answer = airlinesLine + ' Vergleiche Preise und Leistungen direkt in der Suche, um die für dich passende Airline zu finden.';
          }
          [0, 2, 3].forEach(function(i) {
            var el = document.getElementById('faq-item-' + i);
            if (el) {
              var a = el.querySelector('.route-faq-a');
              if (a) a.textContent = faqItems[i].answer;
            }
          });
          refreshSchema();
        }
      }
    })
    .catch(function(){
      document.getElementById('route-price-box').innerHTML = '<div style="color:rgba(255,255,255,.5);font-size:13px">Aktuelle Preise direkt in der Suche verfügbar</div>';
    });
}

</script>

</body>
</html>
