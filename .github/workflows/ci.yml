name: CI Checks (Frontend)

# [CI-PIPELINE-FIX] Runs on every push/PR to main in the flywise-app
# (frontend) repo. Checks app.js/admin.js/config.js/build/*.js for syntax
# errors and every HTML page's inline <script> blocks — the two things
# most likely to silently break the live site if a typo slips through.
# The separate build-check job runs the real SSG build against the live
# backend (non-blocking — see its own comment for why).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check app.js syntax
        run: node --check app.js

      - name: Check admin.js syntax
        run: node --check admin.js

      - name: Check config.js syntax
        run: node --check config.js

      - name: Check analytics.js syntax
        run: node --check analytics.js

      - name: Check build/*.js syntax
        run: for f in build/*.js; do node --check "$f"; done

      - name: Check inline <script> blocks in every HTML page
        run: |
          node -e "
          const fs = require('fs');
          const vm = require('vm');

          const htmlFiles = fs.readdirSync('.').filter(f => f.endsWith('.html'));
          let failed = false;

          for (const file of htmlFiles) {
            const html = fs.readFileSync(file, 'utf8');
            const blocks = [...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
            blocks.forEach((m, i) => {
              try {
                new vm.Script(m[1]);
              } catch (e) {
                failed = true;
                console.error(\`❌ \${file} — inline <script> block #\${i}: \${e.message}\`);
              }
            });
          }

          if (failed) {
            console.error('\\nOne or more inline <script> blocks failed to parse.');
            process.exit(1);
          } else {
            console.log(\`✅ All inline <script> blocks parsed cleanly across \${htmlFiles.length} HTML files.\`);
          }
          "

  build-check:
    runs-on: ubuntu-latest
    # Non-blocking: this exercises the real SSG build (build/generate-pages.js)
    # against the live backend API. continue-on-error so a live-API hiccup
    # doesn't fail an unrelated PR — a genuine code bug still shows up loudly
    # in the job's own log.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run the SSG build
        run: npm run build
