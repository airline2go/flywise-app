<meta charset="UTF-8">

<style>
/* ============================================================
   Airpiv Journal — article page. Signature element: the header
   is rendered as an actual boarding pass, "FROM Airpiv Journal
   TO <post title>" — the same ticket vernacular as the listing
   page, carried through to the reading experience.
   ============================================================ */
body{background:var(--bg2)}
main#post-main{max-width:700px;margin:0 auto;padding:34px var(--pad) 80px}
.back-link{color:var(--tx2)}

/* ── Boarding-pass header ── */
.pass{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 22px rgba(10,24,34,.09);border:1px solid var(--bd);margin-bottom:8px}
.pass-strip{background:linear-gradient(135deg,var(--navy) 0,var(--navy2) 100%);padding:12px 22px;display:flex;align-items:center;justify-content:space-between}
.pass-strip-brand{display:flex;align-items:center;gap:7px;color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:.01em}
.pass-strip-brand svg{flex-shrink:0}
.pass-strip-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55)}
.pass-route{display:grid;grid-template-columns:auto 34px 1fr;align-items:start;gap:14px;padding:22px 22px 18px}
.pass-route-col{min-width:0}
.pass-route-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
.pass-route-from{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;color:var(--tx2)}
.pass-route-plane{display:flex;align-items:center;justify-content:center;padding-top:6px;color:var(--teal);font-size:15px}
.pass-route-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.55rem;line-height:1.18;color:var(--tx);letter-spacing:-.01em;word-break:break-word}
.pass-perf{position:relative;height:0;border-top:2px dashed var(--bd2);margin:0 22px}
.pass-perf::before,.pass-perf::after{content:'';position:absolute;top:50%;width:20px;height:20px;border-radius:50%;background:var(--bg2);transform:translateY(-50%)}
.pass-perf::before{left:-32px}
.pass-perf::after{right:-32px}
.pass-meta{display:flex;flex-wrap:wrap;gap:22px;padding:16px 22px 20px}
.pass-meta-item{font-family:'IBM Plex Mono',monospace}
.pass-meta-eyebrow{font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:4px}
.pass-meta-val{font-size:12.5px;font-weight:600;color:var(--tx)}

.post-cover{width:100%;max-height:380px;object-fit:cover;border-radius:16px;margin:22px 0 8px;display:block}

/* ── Article body — editorial pass ── */
.post-body{font-size:16px;line-height:1.85;color:var(--tx2);margin-top:18px}
.post-body>p:first-of-type::first-letter{font-family:'Syne',sans-serif;font-weight:800;font-size:3.4em;line-height:.82;float:left;padding:6px 8px 0 0;color:var(--teal2)}
.post-body h2{font-family:'Syne',sans-serif;font-size:1.45rem;color:var(--tx);margin:36px 0 14px;letter-spacing:-.01em}
.post-body h3{font-family:'Syne',sans-serif;font-size:1.18rem;color:var(--tx);margin:26px 0 11px}
.post-body p{margin:0 0 18px}
.post-body ul,.post-body ol{margin:0 0 18px;padding-right:22px}
.post-body li{margin-bottom:7px}
.post-body a{color:var(--teal2);text-decoration:underline;text-underline-offset:2px}
.post-body strong{color:var(--tx)}
.post-body img{max-width:100%;border-radius:12px;margin:8px 0}
.post-body blockquote{margin:22px 0;padding:4px 0 4px 20px;border-right:none;border-left:3px solid var(--teal);color:var(--tx);font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;line-height:1.5}

.post-notfound{text-align:center;padding:60px 20px}
.post-notfound h1{font-family:'Syne',sans-serif;font-size:1.5rem;color:var(--tx);margin-bottom:8px}

@media(max-width:520px){
  .pass-route{grid-template-columns:1fr;gap:8px}
  .pass-route-plane{display:none}
  .pass-route-title{font-size:1.3rem}
}

[data-theme=dark] body{background:#0d1420}
[data-theme=dark] .pass{background:var(--navy2);border-color:rgba(255,255,255,.08)}
[data-theme=dark] .pass-perf::before,[data-theme=dark] .pass-perf::after{background:#0d1420}
[data-theme=dark] .pass-route-title,[data-theme=dark] .pass-meta-val{color:#eef3f7}
[data-theme=dark] .post-body{color:#aebcc9}
[data-theme=dark] .post-body h2,[data-theme=dark] .post-body h3,[data-theme=dark] .post-body strong{color:#eef3f7}
</style>
</head>
<body>

<nav class="topnav">
  <div class="navi">
    <a href="/" class="logo"><picture>
      <source srcset="/airpiv-logo.webp" type="image/webp">
      <img src="/airpiv-logo.png" alt="Airpiv">
    </picture></a>
    <div class="navr">
      <a href="/" class="btn-t">Flüge suchen</a>
    </div>
  </div>
</nav>

<main id="post-main">
  <a href="/blog.html" class="back-link">← Zurück zum Blog</a>
  <div id="post-content">
    <div class="jrn-empty" style="text-align:center;padding:50px 20px;color:var(--tx3)">Lade Beitrag…</div>
  </div>
</main>

<footer><div class="fi2">
  <div class="fgr">
    <div><div class="flo"><span style="display:inline-flex;width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#12C7B0,#0A9384);align-items:center;justify-content:center"><svg width="17" height="17" viewBox="0 0 64 64" fill="none"><path d="M32 14 L46 46 L32 38 L18 46 Z" fill="#0A1822"/></svg></span>Air<span style="color:var(--teal)">piv</span></div><p class="fdes">Finde Flüge, die sonst niemand findet. 600+ Airlines, beste Preise, volle Garantie.</p></div>
    <div class="fcol"><h4>Unternehmen</h4><ul><li><a href="/about.html">Über uns</a></li><li><a href="/blog.html">Blog</a></li></ul></div>
    <div class="fcol"><h4>Support</h4><ul><li><a href="/contact.html">Kontakt</a></li><li><a href="/privacy.html">Datenschutz</a></li><li><a href="/terms.html">AGB</a></li></ul></div>
  </div>
  <div class="fbot"><p>© 2026 Airpiv · Alle Rechte vorbehalten</p></div>
</div></footer>

<script>
var PROXY = 'https://api.airpiv.com';

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

var params = new URLSearchParams(window.location.search);
var slug = params.get('slug');

if (!slug) {
  renderNotFound();
} else {
  fetch(PROXY + '/blog-posts/' + encodeURIComponent(slug))
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok || !j.post) { renderNotFound(); return; }
      renderPost(j.post);
    })
    .catch(function(){ renderNotFound(); });
}

function renderNotFound() {
  document.getElementById('post-content').innerHTML =
    '<div class="post-notfound">' +
      '<h1>Beitrag nicht gefunden</h1>' +
      '<p style="color:var(--tx3)">Dieser Blog-Beitrag existiert nicht oder wurde entfernt.</p>' +
      '<a href="/blog.html" class="btn-t" style="display:inline-flex;margin-top:16px">← Zum Blog</a>' +
    '</div>';
}

function renderPost(post) {
  var url = 'https://airpiv.com/blog-post.html?slug=' + encodeURIComponent(post.slug);
  var description = post.meta_description || post.excerpt || (post.title + ' — Airpiv Blog');
  var image = post.cover_image_url || 'https://airpiv.com/og-image.png';

  // [BLOG-SYSTEM] Dynamically rewrite the per-post SEO tags now that the
  // real post data has arrived — this is what makes every post distinct
  // to Google/social previews despite all posts sharing this one file.
  document.getElementById('page-title').textContent = post.title + ' | Airpiv Blog';
  document.getElementById('page-description').setAttribute('content', description);
  document.getElementById('page-canonical').setAttribute('href', url);
  document.getElementById('og-title').setAttribute('content', post.title);
  document.getElementById('og-description').setAttribute('content', description);
  document.getElementById('og-url').setAttribute('content', url);
  document.getElementById('og-image').setAttribute('content', image);
  document.getElementById('twitter-image').setAttribute('content', image);

  // Word count from the rendered text content (strip HTML tags first) —
  // a real signal of article depth, computed from whatever the post
  // actually contains rather than hardcoded.
  var plainText = post.content.replace(/<[^>]+>/g, ' ');
  var wordCount = plainText.trim().split(/\s+/).filter(Boolean).length;

  document.getElementById('article-schema').textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": post.title,
    "description": description,
    "image": image,
    // [BLOG-SCHEMA-FIX] Self-contained publisher object (name + logo)
    // instead of an @id reference to index.html's organization schema —
    // this page's structured data is now valid on its own even if a
    // crawler reads it in isolation, never depending on another page's
    // markup resolving correctly.
    "publisher": {
      "@type": "Organization",
      "name": "Airpiv",
      "url": "https://airpiv.com",
      "logo": { "@type": "ImageObject", "url": "https://airpiv.com/airpiv-logo.png" }
    },
    "author": { "@type": "Organization", "name": post.author || "Airpiv Team" },
    "datePublished": post.published_at,
    "dateModified": post.updated_at || post.published_at,
    "mainEntityOfPage": { "@type": "WebPage", "@id": url },
    "articleSection": "Reisetipps",
    "wordCount": wordCount,
    "inLanguage": "de-DE"
  });

  var dateStr = post.published_at ? new Date(post.published_at).toLocaleDateString('de-DE', {year:'numeric',month:'long',day:'numeric'}) : '—';
  var cover = post.cover_image_url ? '<img class="post-cover" src="' + escHtml(post.cover_image_url) + '" alt="' + escHtml(post.title) + '">' : '';

  document.getElementById('post-content').innerHTML =
    '<div class="pass">' +
      '<div class="pass-strip">' +
        '<div class="pass-strip-brand"><svg width="15" height="15" viewBox="0 0 64 64" fill="none"><path d="M32 10 L48 46 L32 37 L16 46 Z" fill="#0FB5A0"/></svg>Airpiv</div>' +
        '<div class="pass-strip-label">Boarding Pass</div>' +
      '</div>' +
      '<div class="pass-route">' +
        '<div class="pass-route-col">' +
          '<div class="pass-route-eyebrow">Von</div>' +
          '<div class="pass-route-from">Airpiv Journal</div>' +
        '</div>' +
        '<div class="pass-route-plane">✈</div>' +
        '<div class="pass-route-col">' +
          '<div class="pass-route-eyebrow">Zu</div>' +
          '<h1 class="pass-route-title">' + escHtml(post.title) + '</h1>' +
        '</div>' +
      '</div>' +
      '<div class="pass-perf" aria-hidden="true"></div>' +
      '<div class="pass-meta">' +
        '<div class="pass-meta-item"><div class="pass-meta-eyebrow">Autor</div><div class="pass-meta-val">' + escHtml(post.author || 'Airpiv Team') + '</div></div>' +
        '<div class="pass-meta-item"><div class="pass-meta-eyebrow">Datum</div><div class="pass-meta-val">' + dateStr + '</div></div>' +
      '</div>' +
    '</div>' +
    cover +
    '<div class="post-body">' + post.content + '</div>';
}
</script>

</body>
</html>
